CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=120000

# Allow BLE to disconnect during sleep
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=60
CONFIG_BT_PERIPHERAL_PREF_LATENCY=199
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=500

# Critical: Let the connection drop during idle
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# Disable constant scanning
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=n
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=n
CONFIG_ZMK_BLE_SPLIT_CENTRAL_BATTERY_LEVEL_FETCHING=n
